apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-indexer
  namespace: lumina-marketplace
  labels:
    app: search-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-indexer
  template:
    metadata:
      labels:
        app: search-indexer
    spec:
      containers:
        - name: search-indexer
          image: ghcr.io/lumina/search-indexer:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: lumina-config
            - secretRef:
                name: lumina-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: search-indexer
  namespace: lumina-marketplace
spec:
  selector:
    app: search-indexer
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
